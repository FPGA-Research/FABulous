version: 2
updates:
  - package-ecosystem: "uv"
    directories:
      - "/"
      - "/docs"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 2
    labels:
      - "dependencies"
    groups:
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"
      major:
        update-types:
          - "major"
    commit-message:
      prefix: "chore"
      include: "scope"

  - package-ecosystem: "nix"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 2
    labels:
      - "dependencies"
    groups:
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"
      major:
        update-types:
          - "major"
    commit-message:
      prefix: "chore"
      include: "scope"

  - package-ecosystem: "github-actions"
    directories:
      - "/"
      - "/.github/**/*"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 2
    labels:
      - "dependencies"
    groups:
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"
      major:
        update-types:
          - "major"
    commit-message:
      prefix: "chore"
      include: "scope"

  - package-ecosystem: "pre-commit"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 2
    labels:
      - "dependencies"
    groups:
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"
      major:
        update-types:
          - "major"
    commit-message:
      prefix: "chore"
      include: "scope"
    # pydoclint 0.9.1 regressed numpy docstring parsing (the `, optional` /
    # `default=...` suffix is read as part of the type hint), producing false
    # DOC105/DOC605 errors. Skip that release; drop this once a fix ships.
    ignore:
      - dependency-name: "https://github.com/jsh9/pydoclint"
        versions: ["0.9.1"]

  - package-ecosystem: "docker"
    directory: "/.devcontainer"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
    commit-message:
      prefix: "chore"
      include: "scope"
    # Pin the Ubuntu base image to an LTS release manually. Dependabot cannot
    # distinguish LTS (even-year .04) from interim releases, and break the build.
    ignore:
      - dependency-name: "ubuntu"
